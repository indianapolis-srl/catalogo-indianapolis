<head>

<title>Catalogo &mdash; Indianapolis SRL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f2;--surface:#fff;--border:#e4e0db;--border-strong:#c8c2bb;
  --text:#111;--text-mid:#555;--text-soft:#999;
  --red:#e31e24;--wa:#25d366;--radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
header{background:#111;padding:0 clamp(1.5rem,5vw,4rem);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--red)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:68px;gap:1rem}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{height:42px;width:42px;object-fit:cover;border-radius:8px}
.logo-text{display:flex;flex-direction:column;gap:1px}
.logo-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:.5px;text-transform:uppercase}
.logo-sub{font-size:10px;color:#888;letter-spacing:.8px;text-transform:uppercase}
.wa-header{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:999px;border:1px solid #333;background:transparent;color:#ddd;font-size:13px;font-weight:500;text-decoration:none;transition:all .15s;white-space:nowrap}
.wa-header:hover{background:var(--red);border-color:var(--red);color:#fff}
.wa-dot{width:8px;height:8px;border-radius:50%;background:var(--wa);flex-shrink:0;display:inline-block}
.hero{background:#111;color:#f5f4f2;padding:clamp(2.5rem,7vw,4.5rem) clamp(1.5rem,5vw,4rem);text-align:center;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red)}
.hero-logo{width:72px;height:72px;object-fit:cover;border-radius:14px;margin:0 auto 1.2rem;display:block}
.hero-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);margin-bottom:.8rem;font-weight:600}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(2.5rem,7vw,4.5rem);line-height:1;margin-bottom:.8rem;color:#fff}
.hero-sub{font-size:15px;color:#888;max-width:460px;margin:0 auto;line-height:1.6}
main{max-width:1100px;margin:0 auto;padding:clamp(2rem,5vw,3rem) clamp(1.5rem,5vw,4rem)}
.section-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
.section-title{font-size:12px;color:var(--text-soft);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.fbtn{font-size:13px;padding:6px 18px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text-mid);font-family:'DM Sans',sans-serif;transition:all .15s;font-weight:500}
.fbtn:hover{border-color:var(--red);color:var(--red)}
.fbtn.active{background:var(--red);color:#fff;border-color:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;animation:fadeUp .4s ease both}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.1);border-color:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.img-wrap{position:relative;width:100%;aspect-ratio:3/4;background:#eeebe6;overflow:hidden}
.img-wrap img.slide{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.card:hover .img-wrap img.slide{transform:scale(1.04)}
.dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;border:none;padding:0;transition:background .2s}
.dot.active{background:#fff}
.color-badge{position:absolute;top:12px;right:12px;font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500}
.badge-blanca{background:rgba(255,255,255,.92);color:#444;border:1px solid #ddd}
.badge-negra{background:rgba(15,15,15,.88);color:#e0e0e0}
.badge-natural{background:rgba(240,220,180,.95);color:#5a3e1b;border:1px solid #d4a96a}
.badge-aluminio{background:rgba(220,225,230,.95);color:#2a3540;border:1px solid #aab4bb}
.body{padding:1.1rem 1.2rem 1rem;display:flex;flex-direction:column;gap:6px}
.tipo{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.8px}
.model{font-family:'DM Serif Display',serif;font-size:21px;color:var(--text);line-height:1.15}
.desc{font-size:13px;color:var(--text-mid);line-height:1.5}
.specs{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.spec{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg);color:var(--text-mid);border:1px solid var(--border)}
.price-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:11px;border-top:1px solid var(--border);gap:8px}
.price{font-size:17px;font-weight:600;color:var(--text)}
.btn-wa{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--red);background:transparent;color:var(--red);text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-wa:hover{background:var(--red);color:#fff}
footer{background:#111;color:#777;padding:2rem clamp(1.5rem,5vw,4rem);border-top:3px solid var(--red)}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center}
.footer-logo{width:52px;height:52px;object-fit:cover;border-radius:10px;margin-bottom:.4rem}
.footer-name{font-size:13px;font-weight:600;color:#ddd;letter-spacing:.5px;text-transform:uppercase}
.footer-email{font-size:13px;color:#555}
.footer-wa{display:inline-flex;align-items:center;gap:8px;margin-top:.8rem;padding:9px 24px;border-radius:999px;border:1px solid #333;background:transparent;color:#aaa;font-size:13px;text-decoration:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.footer-wa:hover{background:var(--red);border-color:var(--red);color:#fff}
@media(max-width:520px){
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .body{padding:.85rem;gap:5px}
  .model{font-size:17px}
  .price{font-size:14px}
  .btn-wa{font-size:11px;padding:6px 10px}
  .wa-header span:last-child{display:none}
}
</style>
</head>

products.sort(function(a,b){return parseInt(a.price.replace(/[^0-9]/g,""))-parseInt(b.price.replace(/[^0-9]/g,""));});
var cats=["Todos"];
products.forEach(function(p){if(cats.indexOf(p.cat)===-1)cats.push(p.cat);});
var active="Todos";
function waLink(m,c){return WA+"?text="+encodeURIComponent("Hola! Vi el catalogo y quiero consultar por: "+m+" "+c+".");}
function renderFilters(){
  document.getElementById("filters").innerHTML=cats.map(function(c){
    return '<button class="fbtn'+(c===active?' active':'')+'" onclick="setFilter(this.dataset.cat)" data-cat="'+c+'">'+c+'</button>';
  }).join("");
}
function buildCard(p,gi){
  var multi=p.imgs.length>1;
  var dots="";
  if(multi){
    dots='<div class="dots">';
    for(var j=0;j<p.imgs.length;j++){
      dots+='<button class="dot'+(j===0?' active':'')+'" data-gi="'+gi+'" data-si="'+j+'" onclick="goSlide(parseInt(this.dataset.gi),parseInt(this.dataset.si))"></button>';
    }
    dots+='</div>';
  }
  var specs=p.specs.map(function(s){return '<span class="spec">'+s+'</span>';}).join('');
  return '<div class="card" data-idx="'+gi+'" style="animation-delay:'+(gi*0.06)+'s">'+
    '<div class="img-wrap">'+
    '<img class="slide" src="'+p.imgs[0]+'" alt="'+p.model+' '+p.color+'"/>'+
    '<span class="color-badge '+p.badge+'">'+p.color+'</span>'+
    dots+'</div>'+
    '<div class="body">'+
    '<div class="tipo">'+p.tipo+'</div>'+
    '<div class="model">'+p.model+'</div>'+
    '<div class="desc">'+p.desc+'</div>'+
    '<div class="specs">'+specs+'</div>'+
    '<div class="price-row">'+
    '<span class="price">'+p.price+'</span>'+
    '<a class="btn-wa" href="'+waLink(p.model,p.color)+'" target="_blank" rel="noopener"><span class="wa-dot"></span> Consultar</a>'+
    '</div></div></div>';
}
function goSlide(gi,si){
  var p=products[gi];
  var card=document.querySelector('.card[data-idx="'+gi+'"]');
  if(!card||!p)return;
  card.querySelector(".slide").src=p.imgs[si];
  card.querySelectorAll(".dot").forEach(function(d,j){d.classList.toggle("active",j===si);});
}
function renderGrid(){
  var list=active==="Todos"?products:products.filter(function(p){return p.cat===active;});
  document.getElementById("grid").innerHTML=list.map(function(p){return buildCard(p,products.indexOf(p));}).join("");
}
function setFilter(cat){active=cat;renderFilters();renderGrid();}
renderFilters();renderGrid();
</script>
